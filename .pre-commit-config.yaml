repos:
  - repo: https://github.com/jolars/panache-pre-commit
    rev: v2.61.0

    hooks:
      - id: panache-format
      - id: panache-lint

  - repo: https://github.com/posit-dev/air-pre-commit
    rev: 0.10.0
    hooks:
      - id: air-format

  - repo: https://github.com/etiennebacher/jarl-pre-commit
    rev: 0.5.0
    hooks:
      - id: jarl-check

  - repo: local
    hooks:
      - id: readme-rmd-rendered
        name: README.md is up to date with README.Rmd
        entry: >
          bash -c 'if [ README.Rmd -nt README.md ]; then
          echo "README.md is out of date; re-knit with devtools::build_readme()";
          exit 1; fi'
        language: system
        files: '^README\.(R)?md$'
        pass_filenames: false
      - id: needs-roxygenize
        name: roxygen2 documentation is up to date
        entry: >
          Rscript -e 'if (roxygen2::needs_roxygenize())
          stop("Documentation is out of date; run roxygen2::roxygenise()")'
        language: system
        files: '^(R/|DESCRIPTION|NAMESPACE|man/)'
        pass_filenames: false
